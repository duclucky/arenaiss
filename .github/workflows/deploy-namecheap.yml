name: Deploy to Namecheap Stellar

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build standalone app
        run: npm run build

      - name: Prepare FTP payload
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/static
          if [ -d public ]; then cp -R public deploy/public; fi

      - name: Upload to Namecheap FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_ARENAISS_HOST || 'ftp.arenaiss.xyz' }}
          username: Arenaiss@arenaiss.xyz
          password: ${{ secrets.FTP_ARENAISS }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_ARENAISS_DIR || '/arenaiss/' }}
          protocol: ftp
