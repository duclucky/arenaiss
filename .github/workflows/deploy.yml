name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check startup wrapper
        run: node --check hosting/namecheap-server.js

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build standalone app
        run: npm run build

      - name: Prepare FTP payload
        run: |
          rm -rf deploy
          mkdir -p deploy/app deploy/tmp
          cp hosting/namecheap-server.js deploy/server.js
          
          # Sử dụng package.json của Next.js standalone vì nó chứa ĐÚNG danh sách dependencies cần thiết cho production.
          # Thêm script start để cPanel UI hiển thị (dù Passenger dùng server.js).
          cp .next/standalone/package.json deploy/package.json
          node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('deploy/package.json')); pkg.scripts = pkg.scripts || {}; pkg.scripts.start = 'node server.js'; fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2) + '\n');"
          
          cp -R .next/standalone/. deploy/app/
          mkdir -p deploy/app/.next
          cp -R .next/static deploy/app/.next/static
          if [ -d public ]; then cp -R public deploy/app/public; fi
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy/tmp/restart.txt

      - name: Syntax check deploy payload
        run: node --check deploy/server.js && node --check deploy/app/server.js

      - name: Upload to Namecheap FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_ARENAISS_HOST || 'ftp.arenaiss.xyz' }}
          username: ${{ secrets.FTP_USERNAME || 'Arenaiss@arenaiss.xyz' }}
          password: ${{ secrets.FTP_PASSWORD || secrets.FTP_ARENAISS }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          protocol: ftp
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/*.env
            **/data/**
            **/*.log

      - name: Verify live site
        run: |
          curl -fsSI https://arenaiss.xyz
          curl -fsSL https://arenaiss.xyz | grep -i "Arenaiss"

      - name: Fetch cPanel error log after verify failure
        if: failure()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER || secrets.FTP_ARENAISS_HOST || 'ftp.arenaiss.xyz' }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME || 'Arenaiss@arenaiss.xyz' }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.FTP_ARENAISS }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || secrets.FTP_ARENAISS_DIR || '/arenaiss/' }}
        run: |
          echo "Remote app root listing:"
          curl --silent --show-error --fail --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER$FTP_SERVER_DIR" || true
          echo ""
          echo "Remote app folder listing:"
          curl --silent --show-error --fail --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER${FTP_SERVER_DIR%/}/app/" || true
          echo ""
          echo "Remote Next module listing:"
          curl --silent --show-error --fail --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER${FTP_SERVER_DIR%/}/app/node_modules/next/" || true
          echo ""
          echo "Last boot.log lines:"
          curl --silent --show-error --fail --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER${FTP_SERVER_DIR%/}/boot.log" | tail -n 120 || true
          echo ""
          echo "Last cPanel stderr.log lines:"
          curl --silent --show-error --fail --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER${FTP_SERVER_DIR%/}/stderr.log" | tail -n 160 || true
