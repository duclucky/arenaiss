name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check startup wrapper
        run: node --check hosting/namecheap-server.js

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build standalone app
        run: npm run build

      - name: Prepare FTP payload
        run: |
          rm -rf deploy
          mkdir -p deploy/app deploy/tmp
          cp hosting/namecheap-server.js deploy/server.js
          node -e "require('node:fs').writeFileSync('deploy/package.json', JSON.stringify({ name: 'arenaiss-namecheap', private: true, scripts: { start: 'node server.js' } }, null, 2) + '\n')"
          cp -R .next/standalone/. deploy/app/
          mkdir -p deploy/app/.next
          cp -R .next/static deploy/app/.next/static
          if [ -d public ]; then cp -R public deploy/app/public; fi
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy/tmp/restart.txt

      - name: Syntax check deploy payload
        run: node --check deploy/server.js && node --check deploy/app/server.js

      - name: Upload to Namecheap FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_ARENAISS_HOST || 'ftp.arenaiss.xyz' }}
          username: ${{ secrets.FTP_USERNAME || 'Arenaiss@arenaiss.xyz' }}
          password: ${{ secrets.FTP_PASSWORD || secrets.FTP_ARENAISS }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR || secrets.FTP_ARENAISS_DIR || '/arenaiss/' }}
          protocol: ftp
